# Email (SMTP). Leave mail.smtp.host empty to disable outbound mail (forgot-password will show an error until configured).
mail.smtp.host=
mail.smtp.port=587
mail.smtp.starttls=true
mail.smtp.auth=true
mail.smtp.username=
mail.smtp.password=

# Display name and From address (noreply-style sender used by many production apps)
mail.from.address=noreply@internlink.com.np
mail.from.name=InternLink Nepal

# OAuth — Google Cloud Console / Facebook Developers. Web application redirect URIs must match exactly what the server uses.
# You can also set environment variables (no spaces): INTERNLINK_OAUTH_GOOGLE_CLIENT_ID, INTERNLINK_OAUTH_GOOGLE_CLIENT_SECRET,
# INTERNLINK_OAUTH_FACEBOOK_APP_ID, INTERNLINK_OAUTH_FACEBOOK_APP_SECRET,
# or place this same file at %CATALINA_BASE%/conf/internlink.properties (overrides classpath).
oauth.google.clientId=
oauth.google.clientSecret=

oauth.facebook.appId=
oauth.facebook.appSecret=
